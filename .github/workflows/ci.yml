name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for a pre-release dry-run of the native build (the `native` job below).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: the regression net the test plan builds — tests, both linters (detekt + ktlint are
  # now green tree-wide), and the per-module coverage floor. All four are enforced on every PR.
  verify:
    name: test + lint + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Test + ktlint + detekt + Kover coverage verification
        run: ./gradlew test ktlintCheck detekt koverVerify --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore

  # Builds the GraalVM native client + daemon installDist image (only here and in release.yml; the
  # verify job never compiles them) so native-build breakage or a daemon that won't boot on a stock JDK
  # is caught before a release, not at publish time. Runs on main pushes and manual dispatch, not on PRs.
  native:
    name: native build + smoke (${{ matrix.target }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64,   exe: "",     ktricsd: ktricsd }
          - { os: macos-latest,   target: macos-arm64, exe: "",     ktricsd: ktricsd }
          - { os: windows-latest, target: windows-x64, exe: ".exe", ktricsd: ktricsd.bat }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # GraalVM JDK 25 (native-image toolchain for :client:nativeCompile). 25 carries a native-image that
      # locates current Visual Studio; the frozen community 21.0.2 could not find VS 2026. :daemon:installDist
      # needs only a JDK 21+ and rides on this one.
      - uses: graalvm/setup-graalvm@329c42c5f4c343bceb505f0b28cc8499bc2bf174 # v1.5.4
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native client + daemon image
        shell: bash
        run: ./gradlew --no-daemon --no-configuration-cache :client:nativeCompile :daemon:installDist

      # The daemon must boot the embedded platform on the runner's system Java (GraalVM 25, found via
      # JAVA_HOME) and analyze a real file; a broken launcher or unresolved module crashes here.
      - name: Smoke test (native client + daemon on system Java)
        shell: bash
        run: |
          set -euo pipefail
          "client/build/native/nativeCompile/ktrics${{ matrix.exe }}" --version
          "daemon/build/install/ktricsd/bin/${{ matrix.ktricsd }}" --version
          "daemon/build/install/ktricsd/bin/${{ matrix.ktricsd }}" analyze --root "$PWD/testdata/analyze"
