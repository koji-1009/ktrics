name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: the regression net the test plan builds — tests, both linters (detekt + ktlint are
  # now green tree-wide), and the per-module coverage floor. All four are enforced on every PR.
  verify:
    name: test + lint + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Test + ktlint + detekt + Kover coverage verification
        run: ./gradlew test ktlintCheck detekt koverVerify --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
