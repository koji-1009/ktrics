name: release

# When a GitHub Release is published, build the per-OS CLI archives and attach them to it.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # native-image can't cross-compile, so the client is built on each target OS.
        # Windows is pinned to windows-2022 (VS 2022): GraalVM CE 21.0.2 — the last community 21 build —
        # can't locate Visual Studio 2026, which `windows-latest` now maps to, and native-image fails
        # with "Failed to find 'vcvarsall.bat'". Revisit when GraalVM is upgraded past a VS-2026-aware build.
        include:
          - { os: ubuntu-latest, target: linux-x64,   archive: tar }
          - { os: macos-latest,  target: macos-arm64, archive: tar }
          - { os: windows-2022,  target: windows-x64, archive: zip }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The tag is the public version; gradle.properties is what the binaries self-report. Refuse to
      # ship a release whose archive name and `ktrics --version` would disagree.
      - name: Verify the release tag matches ktrics.version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          prop="$(sed -n 's/^ktrics\.version=//p' gradle.properties | tr -d '[:space:]')"
          if [ "${tag#v}" != "$prop" ]; then
            echo "::error::release tag '$tag' does not match gradle.properties ktrics.version '$prop'"
            exit 1
          fi

      # GraalVM JDK 21: the native-image toolchain + the JDK the rest of the build needs.
      - uses: graalvm/setup-graalvm@329c42c5f4c343bceb505f0b28cc8499bc2bf174 # v1.5.4
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The daemon image is a self-contained jlink build (a trimmed JRE bundled under bin/, app jars in
      # lib/), so the archive needs NO system Java. badass-runtime (the `runtime` task) is not
      # configuration-cache compatible, hence --no-configuration-cache.
      - name: Build native client + self-contained daemon image
        shell: bash
        run: ./gradlew --no-daemon --no-configuration-cache :client:nativeCompile :daemon:runtime

      # Drop the native `ktrics` into the daemon image's bin/ so DaemonLauncher finds `ktricsd` as a
      # sibling (the bundled `java` + lib/ live alongside), then archive and attach it to the release.
      - name: Package and upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          stage="ktrics-${tag#v}-${{ matrix.target }}"
          dist="daemon/build/image"
          if [ "${{ matrix.archive }}" = zip ]; then
            cp client/build/native/nativeCompile/ktrics.exe "$dist/bin/"
            mv "$dist" "$stage"
            7z a -tzip "$stage.zip" "$stage" >/dev/null
            asset="$stage.zip"
          else
            cp client/build/native/nativeCompile/ktrics "$dist/bin/"
            mv "$dist" "$stage"
            tar -czf "$stage.tar.gz" "$stage"
            asset="$stage.tar.gz"
          fi
          gh release upload "$tag" "$asset" --clobber
