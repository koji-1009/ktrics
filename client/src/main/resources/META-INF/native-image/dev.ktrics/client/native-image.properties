# Native-image config for the ktrics client.
# The client links NONE of the K2/JetBrains platform, so there is no platform reflection to register
# — only kotlinx.serialization's build-time-initialized serializers. CI asserts this stays true
# (a platform type on the classpath would force reflect-config we deliberately do not ship).
Args = --no-fallback \
       -O3 \
       --initialize-at-build-time=kotlin \
       --initialize-at-build-time=kotlinx.serialization \
       -H:+ReportExceptionStackTraces
